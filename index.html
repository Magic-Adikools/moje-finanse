<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanse PRO - System Zarządzania</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpiWeF3KT6DmoFOu2sYnXJ_zkXc7Poyss",
            authDomain: "finanse-pro.firebaseapp.com",
            projectId: "finanse-pro",
            storageBucket: "finanse-pro.firebasestorage.app",
            messagingSenderId: "1075770103726",
            appId: "1:1075770103726:web:4ac44445fc654657475a3f",
            measurementId: "G-TCX9PMV858"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "budzet", "uzytkownik_1");

        let lastAction = 0;
        let remoteTimestamp = 0;

        // 1. POBIERANIE NA START (Naprawia pustą tabelę na telefonie)
        async function initialLoad() {
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const cloud = snap.data();
                    window.data = JSON.parse(cloud.dane);
                    localStorage.setItem("finanse", cloud.dane);
                    remoteTimestamp = cloud.t;
                    console.log("Dane pobrane z chmury");
                    if (typeof load === "function") load();
                }
            } catch (e) { console.error("Błąd startu:", e); }
        }
        
        // Wywołaj start
        initialLoad();

        // 2. WYSYŁANIE DO CHMURY
        window.saveToCloud = async function(dataToSave) {
            const now = Date.now();
            lastAction = now; 
            remoteTimestamp = now;
            try {
                await setDoc(docRef, { 
                    dane: JSON.stringify(dataToSave), 
                    t: now 
                });
            } catch (e) { console.error("Błąd zapisu:", e); }
        };

        // 3. ODBIERANIE ZMIAN (Automatyczna synchronizacja)
        onSnapshot(docRef, (doc) => {
            if (!doc.exists()) return;
            const cloud = doc.data();
            
            // Jeśli w chmurze jest to samo co u nas - ignoruj
            if (cloud.t <= remoteTimestamp) return;

            const isTyping = document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA';
            const now = Date.now();

            // Jeśli minęło 10 sek od naszej aktywności i nie piszemy - aktualizuj ekran
            if (now - lastAction > 10000 && !isTyping) {
                remoteTimestamp = cloud.t;
                window.data = JSON.parse(cloud.dane);
                localStorage.setItem("finanse", cloud.dane);
                if (typeof load === "function") load();
            }
        });

        document.addEventListener('mousedown', () => { lastAction = Date.now(); });
        document.addEventListener('keydown', () => { lastAction = Date.now(); });
        document.addEventListener('touchstart', () => { lastAction = Date.now(); });
    </script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
            --danger: #ff0000;
            --success: #27ae60;
            --reminder: #9b59b6;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin:0; background: var(--bg); color: #333; padding-bottom: 60px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        #months { display: flex; overflow-x: auto; background: #fff; border-bottom: 1px solid #eee; }
        .month { padding: 15px 25px; cursor: pointer; flex: 0 0 auto; border-right: 1px solid #f0f0f0; font-weight: 600; font-size: 14px; }
        .active { background: var(--accent) !important; color: white; }
        .container { padding: 15px; max-width: 850px; margin: auto; }
        h3 { border-left: 5px solid var(--accent); padding: 8px 12px; margin-top: 30px; background: #fff; border-radius: 0 8px 8px 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); font-size: 1.1em; }
        table { width: 100%; background: var(--white); border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }
        th { background: #f1f3f5; padding: 10px; font-size: 10px; text-transform: uppercase; color: #666; }
        td { border-bottom: 1px solid #f0f0f0; padding: 10px 5px; text-align: center; vertical-align: middle; }
        .name-cell { text-align: left !important; min-width: 120px; }
        input, textarea { width: 95%; border: 1px solid #ddd; padding: 8px; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .sub-input { font-size: 11px; color: #777; margin-top: 4px; border: none; background: transparent; border-bottom: 1px dashed #ccc; border-radius: 0; width: 100%; }
        .kwota-wrap { position: relative; }
        .kwota-wrap::after { content: "zł"; position: absolute; right: 8px; top: 10px; font-size: 11px; color: #aaa; }
        .btn-action { background: #eee; border: 1px solid #ccc; cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 4px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-clone { background: #edf2f7; color: #4a5568; border: 1px solid #cbd5e0; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .paid { background-color: #e8f5e9 !important; }
        .partial { background-color: #fffde7 !important; }
        .overdue { background-color: #ffeaea !important; border: 2px solid var(--danger) !important; }
        .summary-box { background: var(--primary); color: white; padding: 20px; border-radius: 12px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-val { font-size: 1.2em; font-weight: bold; }
        #mini-calendar { background: white; padding: 15px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; }
        .cal-day { padding: 8px; border-radius: 5px; }
        .today { background: var(--accent); color: white; font-weight: bold; }
        @media (max-width: 600px) {
            th:nth-child(4), th:nth-child(5) { font-size: 7px; padding: 5px 2px; }
            .action-group { display: flex; flex-direction: column; gap: 2px; }
        }
    </style>
</head>

<body>

<header>
    <h2 style="margin: 5px 0;">💎 Finanse PRO</h2>
</header>

<div id="topbar">
    <button class="btn-action" onclick="prevYear()">◀</button>
    <div style="text-align: center;">
        <span id="year" style="font-weight:bold; font-size:1.3em; display: block;"></span>
        <button onclick="goToToday()" style="font-size: 10px; border: none; background: #eee; border-radius: 4px; padding: 2px 8px; cursor: pointer;">Pokaż DZISIAJ</button>
    </div>
    <button class="btn-action" onclick="nextYear()">▶</button>
</div>

<div id="months"></div>

<div class="container">
    <h3>📈 Dochody</h3>
    <table>
        <thead><tr><th style="width:30px">#</th><th>Nazwa i kwota</th><th style="width:40px">🗑️</th></tr></thead>
        <tbody id="incomeBody"></tbody>
    </table>
    <button class="btn-add" onclick="addIncome()">➕ Dodaj Dochód</button>

    <h3>💸 Wydatki Miesięczne</h3>
    <table>
        <thead><tr><th>#</th><th>Opis / Źródło / Data</th><th>Kwota</th><th>ZAPŁ.</th><th>CZĘŚĆ.</th><th>AKCJA</th></tr></thead>
        <tbody id="expenseBody"></tbody>
    </table>
    <button class="btn-add" onclick="addExpense()">➕ Dodaj Wydatek</button>

    <div class="summary-box">
        <div>Dochody:<br><span class="summary-val" id="sumIncome">0</span> zł</div>
        <div>Wydatki:<br><span class="summary-val" id="sumExpense">0</span> zł</div>
        <div style="grid-column: span 2; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
            Zostaje:<br><span class="summary-val" id="balance" style="font-size: 1.5em; color: #5dade2;">0</span> zł
        </div>
    </div>

    <h3>🔔 Przypomnienia</h3>
    <table><tbody id="reminderBody"></tbody></table>
    <button class="btn-add" style="background:var(--reminder)" onclick="addReminder()">➕ Dodaj Przypomnienie</button>

    <h3>📝 Notatki</h3>
    <textarea id="notes" style="height:100px;" placeholder="Dodatkowe informacje..." oninput="update()"></textarea>
</div>

<script>
let now = new Date();
let currentMonth = now.getMonth();
let currentYear = now.getFullYear();
let calMonth = currentMonth;
let calYear = currentYear;

// Inicjalizacja danych globalnych
window.data = JSON.parse(localStorage.getItem("finanse")) || { global: { longTerm: [] } };

const months = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];

function init() { renderMonths(); updateYear(); load(); }
function updateYear() { document.getElementById("year").innerText = currentYear; }
function prevYear() { currentYear--; updateYear(); load(); }
function nextYear() { currentYear++; updateYear(); load(); }
function goToToday() { currentMonth = now.getMonth(); currentYear = now.getFullYear(); init(); }

function renderMonths() {
    const div = document.getElementById("months");
    div.innerHTML = "";
    months.forEach((m, i) => {
        let d = document.createElement("div");
        d.innerText = m.substring(0,3);
        d.className = "month" + (i === currentMonth ? " active" : "");
        d.onclick = () => { currentMonth = i; renderMonths(); load(); }
        div.appendChild(d);
    });
}

function key() { return currentYear + "-" + currentMonth; }

function save() { 
    localStorage.setItem("finanse", JSON.stringify(window.data)); 
    if (typeof saveToCloud === "function") saveToCloud(window.data);
}

function load() {
    let k = key();
    let d = window.data[k] || { income: [], expense: [], reminders: [], notes: "" };
    document.getElementById("incomeBody").innerHTML = "";
    document.getElementById("expenseBody").innerHTML = "";
    document.getElementById("reminderBody").innerHTML = "";
    if(d.income) d.income.forEach(i => addIncome(i));
    if(d.expense) d.expense.forEach(e => addExpense(e));
    if(d.reminders) d.reminders.forEach(r => addReminder(r));
    document.getElementById("notes").value = d.notes || "";
    update();
}

function addIncome(d = {}) {
    let r = document.getElementById("incomeBody").insertRow();
    r.innerHTML = `<td></td><td><input class="inc-name" value="${d.name||''}" oninput="update()"><input type="number" class="inc-amount" value="${d.amount||''}" oninput="update()"></td><td><button onclick="removeRow(this)">🗑️</button></td>`;
}

function addExpense(d = {}) {
    let r = document.getElementById("expenseBody").insertRow();
    r.innerHTML = `<td></td><td class="name-cell"><input class="exp-name" value="${d.name||''}" oninput="update()"><input type="date" class="exp-date sub-input" value="${d.date||''}" onchange="update()"></td><td><input type="number" class="exp-amount" value="${d.amount||''}" oninput="update()"></td><td><input type="checkbox" class="exp-paid" ${d.paid?'checked':''} onchange="update()"></td><td><input type="checkbox" class="exp-partial" ${d.partial?'checked':''} onchange="update()"></td><td><button onclick="removeRow(this)">🗑️</button></td>`;
}

function addReminder(d = {}) {
    let r = document.getElementById("reminderBody").insertRow();
    r.innerHTML = `<td></td><td><input class="rem-name" value="${d.name||''}" oninput="update()"><input type="date" class="rem-date sub-input" value="${d.date||''}" onchange="update()"></td><td><button onclick="removeRow(this)">🗑️</button></td>`;
}

function removeRow(btn) { btn.closest("tr").remove(); update(); }

function update() {
    let k = key();
    if(!window.data[k]) window.data[k] = { income: [], expense: [], reminders: [] };
    window.data[k].income = []; window.data[k].expense = []; window.data[k].reminders = [];
    window.data[k].notes = document.getElementById("notes").value;
    
    let inc = 0, exp = 0;
    document.querySelectorAll("#incomeBody tr").forEach(r => {
        let n = r.querySelector(".inc-name").value, a = Number(r.querySelector(".inc-amount").value) || 0;
        inc += a; window.data[k].income.push({ name: n, amount: a });
    });
    document.querySelectorAll("#expenseBody tr").forEach(r => {
        let n = r.querySelector(".exp-name").value, a = Number(r.querySelector(".exp-amount").value) || 0, p = r.querySelector(".exp-paid").checked, pr = r.querySelector(".exp-partial").checked, d = r.querySelector(".exp-date").value;
        exp += a; window.data[k].expense.push({ name: n, amount: a, paid: p, partial: pr, date: d });
        r.className = p ? "paid" : (pr ? "partial" : "");
    });
    document.querySelectorAll("#reminderBody tr").forEach(r => {
        window.data[k].reminders.push({ name: r.querySelector(".rem-name").value, date: r.querySelector(".rem-date").value });
    });

    document.getElementById("sumIncome").innerText = inc;
    document.getElementById("sumExpense").innerText = exp;
    document.getElementById("balance").innerText = inc - exp;
    renumber(); save();
}

function renumber() {
    document.querySelectorAll("tbody").forEach(tbody => {
        [...tbody.rows].forEach((r, i) => { r.cells[0].innerText = i + 1; });
    });
}

init();
</script>
</body>
</html>
